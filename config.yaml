mixed-port: 7890
port: 7890
socks-port: 7891
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'
dns:
    enable: true
    ipv6: false
    default-nameserver: [223.5.5.5, 119.29.29.29]
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
    fallback: ['https://doh.dns.sb/dns-query', 'https://dns.cloudflare.com/dns-query', 'https://dns.twnic.tw/dns-query', 'tls://8.8.4.4:853']
    fallback-filter: { geoip: true, ipcidr: [240.0.0.0/4, 0.0.0.0/32] }

# 代理服务器配置
proxies:

  - name: "work-n"
    type: ss
    server: 127.0.0.1
    port: 8080
    cipher: aes-256-gcm
    password: "pwssword"
    udp: false

  - name: "hk-2"
    type: ss
    server: hk2.test.com
    port: 443
    cipher: aes-256-cfb
    password: "password"
    udp: false

  - name: "hk8"
    type: vless
    server: hk8.test.com
    port: 443
    uuid: 702e80b0-87ef-4965-aaf0-54a4e34f6a91
    alterId: 0
    cipher: auto
    tls: true
    sin: hk8.rdvalidasi.com
    flow: xtls-rprx-direct
    network: tcp
    skip-cert-verify: true

  - name: "brail-1"
    type: vless
    server: 127.0.0.1
    port: 8080
    uuid: 702e80b0-4965-438d-aaf0-55c452ede21e
    alterId: 0
    cipher: none
    tls: false
    sin: 127.0.0.1
    flow: xtls-rprx-direct
    network: tcp
    skip-cert-verify: true

  - name: "hk1-ss"
    type: ss
    server: 127.0.0.1
    port: 8080
    cipher: aes-256-gcm
    password: "password"
    udp: false

  - name: "Ind-1"
    type: trojan
    server: idn1.test.com
    port: 8080
    password: 702e80b0-438d-2q3q-asdf-bfbbd334ba13

  - name: work-w
    type: ss
    server: 127.0.0.1
    port: 8080
    cipher: aes-256-gcm
    password: password
    udp: false

  - name: "sg-ssr-1"
    type: ssr
    server: sg1.test.com
    port: 443
    cipher: aes-256-cfb
    method: "aes-256-cfb"
    password: "password"
    udp: false
    obfs: "plain" 
    protocol: "auth_aes128_md5"
    protocol_param: ""
    obfs_param: ""

  - name: "sg-ssr-2"
    type: ssr
    server: sg2.test.com
    port: 443
    cipher: aes-192-cfb
    method: "aes-192-cfb"
    password: "password"
    udp: false
    obfs: "plain"
    protocol: "auth_aes128_md5"
    protocol_param: ""
    obfs_param: ""

rules:
  # 白名单
  - RULE-SET,work-singapore,Ind-1
  - RULE-SET,work-brail,brail-1
  - RULE-SET,work-hk,hk-2
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - IP-CIDR,172.13.0.0/16,DIRECT
  - IP-CIDR,172.13.0.0/12,DIRECT
  - IP-CIDR,172.13.0.0/24,DIRECT
  - RULE-SET,work-direct,DIRECT
  - RULE-SET,applications,DIRECT
  - DOMAIN,clash.razord.top,DIRECT
  - DOMAIN,yacd.haishan.me,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,lancidr,DIRECT
  - RULE-SET,cncidr,DIRECT
  - RULE-SET,google,back
  - RULE-SET,proxy,back
  - RULE-SET,telegramcidr,back
  - MATCH,back


proxy-groups:
  - name: "back"
    type: select
    proxies:
      - "work-n"
      - "hk-2"
      - "hk8"
    work: 300 # 设置为 300 秒
    
